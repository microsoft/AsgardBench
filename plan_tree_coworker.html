de_map[id];\n                if (!n) { vis_cache[id] = false; return false; }\n                if (n.data['depth'][n.idx] &gt; max_depth) { vis_cache[id] = false; return false; }\n                const plans = n.data['plan_names'][n.idx].split('\\n');\n                const v = plans.some(p =&gt; included.has(p));\n                vis_cache[id] = v;\n                return v;\n            }\n\n            // Get visible children of a node\n            function visKids(id) {\n                return (children_map[id] || []).filter(c =&gt; isVis(c));\n            }\n\n            // Count leaves for proportional spacing (memoized)\n            const leaf_cache = {};\n            function countLeaves(id) {\n                if (leaf_cache[id] !== undefined) return leaf_cache[id];\n                const kids = visKids(id);\n                if (kids.length === 0) { leaf_cache[id] = 1; return 1; }\n                let total = 0;\n                for (const k of kids) total += countLeaves(k);\n                leaf_cache[id] = total;\n                return total;\n            }\n\n            // Recursively layout the visible tree\n            if (isVis(ROOT_ID)) {\n                const total_leaves = countLeaves(ROOT_ID);\n\n                function doLayout(id, ymin, ymax) {\n                    const n = node_map[id];\n                    const y = (ymin + ymax) / 2;\n                    const depth = n.data['depth'][n.idx];\n                    const is_final = n.data['is_final'][n.idx];\n                    n.data['y'][n.idx] = y;\n                    n.data['x'][n.idx] = is_final ? (depth - 0.85) * 0.75 : depth * 0.75;\n\n                    const kids = visKids(id);\n                    if (kids.length === 0) return;\n\n                    const tot = kids.reduce((s, k) =&gt; s + countLeaves(k), 0);\n                    let cur = ymin;\n                    for (const k of kids) {\n                        const kl = countLeaves(k);\n                        const kh =
