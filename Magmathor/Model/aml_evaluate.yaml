description: Evaluate models with magmathor-eval

target:
  service: sing
  name: palisades24 # msrresrchvc #palisades27 #palisades24
  workspace_name: lalidenamlws

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - set -ex
    - echo "start"

storage:
  magmathor:
    storage_account_name: magmardata
    container_name: magmathor
  model:
    storage_account_name: reubenprojects
    container_name: model

code:
  local_dir: .
  ignore:
    - .venv
    - .github

search:
  job_template:
    name: eval-{test_name}
    sku: 1x 40G1-A100 # 1x 10C3 # 1x 40G1-A100 # 1x 40G2-A100
    priority: high
    sla_tier: Premium
    process_count_per_node: 1
    identity: managed

    command:
      - set -ex
      - echo "--= Starting Commands =--"

      # Create and activate isolated virtual environment
      - python -m venv .venv
      - . .venv/bin/activate
      - pip install --upgrade pip
      - pip install -e .

      # Extract model config params
      - export MODEL_CONFIG_STR='{model_config}'
      - export MODEL_NAME="$$(echo "$$MODEL_CONFIG_STR" | cut -d':' -f1)"
      - export MODEL_PATH="$$(echo "$$MODEL_CONFIG_STR" | cut -d':' -f3)"
      - export MODEL_CHECKPOINT="/mnt/$$MODEL_PATH/"
      - echo Model Name is $$MODEL_NAME
      - echo Model Path is $$MODEL_PATH
      - echo Full Model Checkpoint Path is $$MODEL_CHECKPOINT

      # Convert boolean params to flags (case-insensitive check for True/true/TRUE)
      - 'TEXT_ONLY_FLAG=$$(echo "{text_only}" | grep -iq "^true$$" && echo "--text_only" || echo "")'
      - 'INCLUDE_COMMON_SENSE_FLAG=$$(echo "{include_common_sense}" | grep -iq "^true$$" && echo "--include_common_sense" || echo "")'
      - 'USE_MEMORY_FLAG=$$(echo "{use_memory}" | grep -iq "^true$$" && echo "--use_memory" || echo "")'
      - 'FULL_STEPS_FLAG=$$(echo "{full_steps}" | grep -iq "^true$$" && echo "--full_steps" || echo "")'

      # Early exit if data already collected for this model/test combo, to avoid loading extra dependencies and model
      - if python Magmathor/Model/model_tester.py --hand_transparency {hand_transparency} --feedback_type {feedback_type} --prompt_version {prompt_version} --temperature {temperature} --max_completion_tokens {max_completion_tokens} --previous_image {previous_image} $$TEXT_ONLY_FLAG $$INCLUDE_COMMON_SENSE_FLAG $$USE_MEMORY_FLAG $$FULL_STEPS_FLAG --check-completion --test "{test_name}" --model "$$MODEL_CHECKPOINT" --model-name "$$MODEL_NAME"; then echo "Already complete for $$MODEL_NAME / {test_name} - exiting early (success)."; exit 0; fi

      # Install Xvfb for Unity virtual display support (REQUIRED for AI2-THOR)
      - sudo apt-get update && sudo apt-get install -y vulkan-tools xvfb mesa-utils

      # Ensure the X11 socket directory exists and is world-writable (fixes Xvfb permission error)
      - sudo mkdir -p /tmp/.X11-unix
      - sudo chmod 1777 /tmp/.X11-unix
      - echo "--= Init Complete =--"

      - echo "--= Creating Display =--"
      - chmod +x Magmathor/Model/create_display.sh
      - bash Magmathor/Model/create_display.sh || true

      - echo "--= Starting Model Tester =--"
      - python Magmathor/Model/model_tester.py --aml --test "{test_name}" --hand_transparency {hand_transparency} --feedback_type {feedback_type} --prompt_version {prompt_version} --temperature {temperature} --max_completion_tokens {max_completion_tokens} --previous_image {previous_image} $$TEXT_ONLY_FLAG $$INCLUDE_COMMON_SENSE_FLAG $$USE_MEMORY_FLAG $$FULL_STEPS_FLAG --model "$$MODEL_CHECKPOINT" --model-name "$$MODEL_NAME"
      - LOG="$$HOME/.config/unity3d/Allen Institute for Artificial Intelligence/AI2-THOR/Player.log"; mkdir -p ./outputs/unity; [ -f "$$LOG" ] && cp "$$LOG" ./outputs/unity/Player.log || echo "Player.log still not present"

    submit_args:
      env:
        NCCL_IB_DISABLE: 0
        NCCL_DEBUG: INFO
        NCCL_IB_TIMEOUT: 60
        MKL_THREADING_LAYER: GNU
        SHARED_MEMORY_PERCENT: 0.5
        NVIDIA_VISIBLE_DEVICES: "all"
        NVIDIA_DRIVER_CAPABILITIES: "compute,utility,video,graphics"
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/2cd190bb-b42a-477c-b1bb-2f20932d8dc5/resourceGroups/lalidenaml/providers/Microsoft.ManagedIdentity/userAssignedIdentities/lalidenamlid"

  max_trials: 80
  type: grid
  params:
    # Boolean flags (converted to CLI flags in command section)
    - name: text_only
      spec: discrete
      values: [false]

    - name: include_common_sense
      spec: discrete
      values: [true]

    - name: previous_image
      spec: discrete
      values: ["none"]  # Options: none, color, grayscale

    - name: use_memory
      spec: discrete
      values: [false]

    - name: full_steps
      spec: discrete
      values: [true]

    # Value parameters
    - name: feedback_type
      spec: discrete
      values: ["simple"]  # Options: none, simple, detailed

    - name: hand_transparency
      spec: discrete
      values: [60]

    - name: prompt_version
      spec: discrete
      values: ["v2"]  # Options: v1, v2

    - name: temperature
      spec: discrete
      values: [0.6]

    - name: max_completion_tokens
      spec: discrete
      values: [4096]

    - name: test_name
      spec: discrete
      values: ["magt_benchmark"]
      # Potential Values: ["benchmark", "test_new_tasks", "test_new_positions_2", "test_new_rooms", "test_new_positions_1"]

    - name: model_config
      spec: discrete
      values: [
        "gpt-4o::gpt-4o",
        #"gpt-o3_BASE::gpt-o3",
        #"GLM-4.1V-9B-Thinking_BASE::model/projects/reubenprojects/pretrained_weights/GLM-4.1V-9B-Thinking/",
        #"GLM-4.5V_BASE::model/projects/reubenprojects/pretrained_weights/GLM-4.5V/",
        #"Replay::replay"
      ]
