description: VLLMs starter

target:
  service: sing
  # name: palisades24
  name: palisades26
  # name: palisades27
  # name: msrresrchvc
  # name: msrresrchbasicvc
  # name: msrresrchlabbasic # <- this is the one that has a bunch of v100s
  workspace_name: atupinirgws

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

  setup:
    - set -ex
    - echo "start"
    - sudo apt-get update
    - sudo apt-get install -yq libc6-dev libgdiplus libx11-dev libxcursor-dev libxrandr-dev
        libxi-dev libgl1-mesa-dev libglu1-mesa-dev ca-certificates curl
    - sudo apt-get install -yq libxss1 libgconf-2-4 libxtst6 libxrandr2 libasound2 libpangocairo-1.0-0
        libatk1.0-0 libgtk-3-0 libgdk-pixbuf2.0-0 xvfb vulkan-tools xvfb mesa-utils pciutils
    - sudo apt-get install -yq mono-runtime mono-complete
    - conda tos accept --override-channels --channel https://repo.anaconda.com/pkgs/main
    - conda tos accept --override-channels --channel https://repo.anaconda.com/pkgs/r
    - conda create -n glm-vllm python==3.12 -y
    - sudo apt install -yq neovim

storage:
  magmathor:
    storage_account_name: magmardata
    container_name: magmathor
  magmar_public:
    storage_account_name: magmardata
    container_name: public
  vlp_datasets:
    storage_account_name: vlpdatasets
    container_name: data
  reuben_models:
    storage_account_name: reubenprojects
    container_name: model
  atupinirgsa_data:
    storage_account_name: atupinirgsa
    container_name: data

# data:
#   local_dir: ../data/output/1__openai_extracted_entities
#   remote_dir: magmar_data/1__openai_extracted_entities
#   storage_id: atupinirgsa_data

code:
  # we don't really care, all we want is the vllm server running
  local_dir: ./scripts/vllm
  # ignore:
  #   - .venv


env_defaults:
  NODES: 2
  GPUS: 8

search:
  job_template:
    name: Magmathor-vllm-eval-{model_config}
    # Multi-node setup: NxGPUs where N=number of nodes
    sku: ${NODES}x40G${GPUS}-A100
    priority: high
    mpi: False
    sla_tier: Premium
    # Let us handle process spawning via Ray
    process_count_per_node: 1
    identity: managed
    command:
      - echo "Starting multi-node vLLM with config {model_config}"
      - echo "NODES=${NODES}, GPUS=${GPUS}"

      # Extract model path from model_config (format: "name:path")
      - export MODEL_CONFIG_STR='{model_config}'
      - export MODEL_NAME="$$(echo "$$MODEL_CONFIG_STR" | cut -d':' -f1)"
      - export MODEL_PATH="$$(echo "$$MODEL_CONFIG_STR" | cut -d':' -f2)"
      - export MODEL_CHECKPOINT="/mnt/$$MODEL_PATH"
      - echo "Model Name $$MODEL_NAME"
      - echo "Model Checkpoint $$MODEL_CHECKPOINT"

      - bash run_vllm.sh

    submit_args:
      container_args:
        shm_size: 256g
        ipc: host
      env:
        NCCL_IB_DISABLE: 0
        NCCL_DEBUG: INFO
        NCCL_IB_TIMEOUT: 60
        MKL_THREADING_LAYER: GNU
        # Ray environment variables will be set by the script
        RAY_DEDUP_LOGS: "0"
        _AZUREML_SINGULARITY_JOB_UAI: /subscriptions/2cd190bb-b42a-477c-b1bb-2f20932d8dc5/resourceGroups/atupinirg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/atupinirgid
    tags: []
  max_trials: 1000
  type: grid
  params:
    - name: model_config
      spec: discrete
      values:
        # Format: "model_name:storage_path" (path is relative to /mnt/)
        # - "Qwen3-VL-32B-Instruct:magmathor/checkpoints/huggingface/Qwen/Qwen3-VL-32B-Instruct/"
        # - "Qwen3-VL-32B-Thinking:magmathor/checkpoints/huggingface/Qwen/Qwen3-VL-32B-Thinking/"

        - "Qwen3-VL-30B-A3B-Thinking:magmathor/checkpoints/huggingface/Qwen/Qwen3-VL-30B-A3B-Thinking/"
        # - "Qwen3-VL-30B-A3B-Instruct:magmathor/checkpoints/huggingface/Qwen/Qwen3-VL-30B-A3B-Instruct/"

        # - "Qwen3-VL-235B-A22B-Thinking:magmathor/checkpoints/huggingface/Qwen/Qwen/Qwen3-VL-235B-A22B-Thinking/"
        # - "Qwen3-VL-235B-A22B-Instruct:magmathor/checkpoints/huggingface/Qwen/Qwen3-VL-235B-A22B-Instruct/"

        # - "DeepSeek-V3.2:magmathor/checkpoints/huggingface/deepseek-ai/DeepSeek-V3.2/"
        # - "Phi-4-multimodal-instruct:magmathor/checkpoints/huggingface/microsoft/Phi-4-multimodal-instruct/"
        # - "Phi-4-reasoning:magmathor/checkpoints/huggingface/microsoft/Phi-4-reasoning/"
        # - "Phi-4-reasoning-plus:magmathor/checkpoints/huggingface/microsoft/Phi-4-reasoning-plus/"
