description: Aggregate and print evaluation results

target:
  service: sing
  name: msrresrchvc # palisades24 #24/27
  workspace_name: lalidenamlws

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - set -ex
    - echo "Starting results aggregation"

storage:
  magmathor:
    storage_account_name: magmardata
    container_name: magmathor

code:
  local_dir: .
  ignore:
    - .venv
    - .github

search:
  job_template:
    name: eval-results
    sku: 1x 40G1-A100 # 1x 40G1-A100
    priority: high
    sla_tier: Premium
    process_count_per_node: 1
    identity: managed

    command:
      - set -ex
      - python -m venv .venv
      - . .venv/bin/activate
      - pip install --upgrade pip
      - pip install -e .
      - echo "Printing discovered results"
      - python Magmathor/Model/results_printer.py

    submit_args:
      env:
        NVIDIA_VISIBLE_DEVICES: "none"
        MKL_THREADING_LAYER: GNU

  max_trials: 1
  type: grid
  params: []
