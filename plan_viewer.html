<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Plan Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f5f5f5; color: #222; }

  /* --- top bar --- */
  .top-bar { background: #fff; border-bottom: 1px solid #ddd; padding: 8px 16px; display: flex; align-items: center; gap: 12px; }
  .top-bar h1 { font-size: 15px; white-space: nowrap; }
  .plan-nav { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-shrink: 0; }
  .top-bar select { font-size: 14px; padding: 4px 6px; max-width: 420px; }
  .nav-btn { font-size: 18px; padding: 2px 12px; cursor: pointer; border: 1px solid #aaa; border-radius: 4px; background: #fff; user-select: none; }
  .nav-btn:hover { background: #e8e8e8; }
  .step-label { font-size: 13px; color: #555; min-width: 70px; text-align: center; }

  /* --- main area --- */
  .main { display: flex; height: calc(100vh - 46px); }
  .image-area { flex: 1; display: flex; align-items: center; justify-content: center; background: #e9e9e9; overflow: hidden; position: relative; }
  .image-area img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .no-image { color: #999; font-style: italic; }

  /* --- side panel --- */
  .side-panel { width: 280px; min-width: 220px; background: #fff; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
  .action-header { padding: 8px 12px; font-weight: 600; font-size: 13px; color: #555; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
  .action-header .action-nav { display: flex; gap: 4px; }
  .action-header .action-nav button { font-size: 14px; padding: 0 8px; cursor: pointer; border: 1px solid #aaa; border-radius: 4px; background: #fff; user-select: none; line-height: 22px; }
  .action-header .action-nav button:hover { background: #e8e8e8; }
  .action-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  .action-item { padding: 5px 12px; font-size: 13px; cursor: pointer; border-left: 3px solid transparent; }
  .action-item:hover { background: #f0f4ff; }
  .action-item.active { background: #e3ecff; border-left-color: #3b82f6; font-weight: 600; }
  .action-idx { color: #999; margin-right: 4px; font-size: 11px; }
</style>
</head>
<body>

<div class="top-bar">
  <h1 id="title"></h1>
  <div class="plan-nav">
    <button class="nav-btn" onclick="prevPlan()" title="Previous plan (Left arrow)">&#9664;</button>
    <select id="plan-select" onchange="selectPlan(this.value)"></select>
    <button class="nav-btn" onclick="nextPlan()" title="Next plan (Right arrow)">&#9654;</button>
  </div>
</div>

<div class="main">
  <div class="image-area" id="image-area">
    <span class="no-image">No image</span>
  </div>
  <div class="side-panel">
    <div class="action-header">
      <span>Actions</span>
      <div class="action-nav">
        <button onclick="prevStep()" title="Previous step (Up arrow)">&#9650;</button>
        <button onclick="nextStep()" title="Next step (Down arrow)">&#9660;</button>
      </div>
    </div>
    <div class="action-list" id="action-list"></div>
  </div>
</div>

let curPlan = 0;
let curStep = 0;

function init() {
  const sel = document.getElementById("plan-select");
  PLANS.forEach((p, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = p.name;
    sel.appendChild(opt);
  });
  selectPlan(0);

  // Keyboard navigation: Left/Right = plans, Up/Down = steps
  document.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft")  { e.preventDefault(); prevPlan(); }
    if (e.key === "ArrowRight") { e.preventDefault(); nextPlan(); }
    if (e.key === "ArrowUp")    { e.preventDefault(); prevStep(); }
    if (e.key === "ArrowDown")  { e.preventDefault(); nextStep(); }
  });
}

function selectPlan(idx) {
  curPlan = parseInt(idx);
  curStep = 0;
  document.getElementById("plan-select").value = curPlan;
  document.getElementById("title").textContent = PLANS[curPlan].task_description;
  renderActions();
  renderStep();
}

function prevPlan() { if (curPlan > 0) selectPlan(curPlan - 1); }
function nextPlan() { if (curPlan < PLANS.length - 1) selectPlan(curPlan + 1); }

function goToStep(idx) {
  curStep = idx;
  renderStep();
  highlightAction();
}

function prevStep() { if (curStep > 0) goToStep(curStep - 1); }
function nextStep() { const s = PLANS[curPlan].steps; if (curStep < s.length - 1) goToStep(curStep + 1); }

function renderActions() {
  const list = document.getElementById("action-list");
  const steps = PLANS[curPlan].steps;
  list.innerHTML = "";
  steps.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "action-item" + (i === curStep ? " active" : "");
    div.innerHTML = '<span class="action-idx">' + (i + 1) + '.</span>' + escHtml(s.action);
    div.onclick = () => goToStep(i);
    list.appendChild(div);
  });
}

function highlightAction() {
  const items = document.querySelectorAll(".action-item");
  items.forEach((el, i) => {
    el.classList.toggle("active", i === curStep);
    if (i === curStep) el.scrollIntoView({ block: "nearest" });
  });
}

function renderStep() {
  const steps = PLANS[curPlan].steps;
  const step = steps[curStep];
  const area = document.getElementById("image-area");

  // Image
  if (step.image) {
    area.innerHTML = '';
    const img = document.createElement('img');
    img.src = step.image;
    img.alt = 'step image';
    area.appendChild(img);
  } else {
    area.innerHTML = '<span class="no-image">No image</span>';
  }

  highlightAction();
}

function encodeImagePath(p) {
  // Encode each path segment to handle spaces and special chars
  return p.split("/").map(s => encodeURIComponent(s)).join("/");
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

init();
</script>
