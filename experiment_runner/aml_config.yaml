# AML Configuration for experiment_runner
# This file configures how experiments are submitted to Azure ML via Amulet.
#
# To enable AML submission:
# 1. Set your Azure Key Vault name (where OPENROUTER_API_KEY is stored)
# 2. Set your managed identity resource ID
# 3. Optionally customize the target cluster and SKU

# Target cluster configuration
target:
  service: sing
  name: msrresrchvc
  workspace_name: atupinirgws

# Job SKU (compute size)
# CPU-only examples: 1x 10C3, 2x 10C3
# GPU examples: 1x 40G1-A100, 1x 10G1-V100
sku: "1x 10C3"

# Job priority and SLA
priority: high
sla_tier: Premium

# Azure Key Vault name for retrieving secrets (e.g., OPENROUTER_API_KEY)
# The secret should be stored as "openrouter-api-key" in the vault
keyvault_name: "atupinirgkv"  # REQUIRED: e.g., "my-keyvault"

# Managed identity for Key Vault access
# Format: /subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/{name}
managed_identity: "/subscriptions/2cd190bb-b42a-477c-b1bb-2f20932d8dc5/resourceGroups/atupinirg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/atupinirgid"  # REQUIRED

# Experiment name prefix for Amulet submissions
experiment_prefix: asgard

# Storage configuration (for mounting blob storage)
storage:
  magmathor:
    storage_account_name: magmardata
    container_name: magmathor
