# Experiment catalogue for GPT-4o ablation study
# All experiments use: prompt_version=v2, temperature=0.6, max_completion_tokens=4096
#
# Reasoning effort for reasoning models (o1, o3, gpt-5, gpt-5.2, etc.):
#   Append effort level to model name: gpt-5.2-{effort}
#   Valid effort levels: none, low, medium, high
#   Example: model: gpt-5.2-medium
#
# Run mode: where to execute the experiment
#   run_mode: local  (default) - Run locally via experiment_runner
#   run_mode: aml    - Submit to AML via Amulet (use 'aml submit' command)
#
# Naming convention: T{text}_F{feedback}_H{hand}_C{common}_P{prompt}_I{images}_R{memory}_S{full_steps}_E{temp}_M{max}
#   T: text_only (0=images, 1=text only)
#   F: feedback_type (n=none, s=simple, d=detailed)
#   H: hand_transparency (00-99)
#   C: include_common_sense (0=off, 1=on)
#   P: prompt_version (1, 2)
#   I: previous_image (0=none, 1=color, 2=grayscale)
#   R: use_memory (0=off, 1=on)
#   S: full_steps (0=off, 1=on)
#   E: temperature (60 = 0.6)
#   M: max_completion_tokens

# Baseline config: T0_Fs_H60_C0_I1_R0_S1

base_settings:
  replicates: 1
  text_only: false
  feedback_type: simple
  hand_transparency: 60
  include_common_sense: false
  prompt_version: v2
  previous_image: color
  use_memory: true
  full_steps: true
  temperature: 0.0
  max_completion_tokens: 4096


